<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Atomic PKM</title>
    <link rel="stylesheet" href="style.css">
    <!-- Toast UI Editor -->
    <link rel="stylesheet" href="https://uicdn.toast.com/editor/latest/toastui-editor.min.css" />
    <!-- Material Symbols -->
    <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Rounded:opsz,wght,FILL,GRAD@24,400,0,0" rel="stylesheet" />
</head>
<body>

<div class="app-container" id="app">
    <aside class="sidebar">
<div class="sidebar-header">
    <div class="menu-container">
        <button id="btn-menu" title="Menu"><span class="material-symbols-rounded">menu</span></button>
        <div id="menu-dropdown" class="dropdown-content hidden">
            <button id="btn-sync" title="Sync Files"><span class="material-symbols-rounded">sync</span> Sync Data</button>
        </div>
    </div>
    <button id="btn-new" title="New Note"><span class="material-symbols-rounded">add</span></button>
    <div class="search-container">
        <div class="search-main">
            <div class="search-input-wrapper">
                <input type="text" id="search-bar" placeholder="Search...">
                <button id="btn-clear-search" class="btn-clear-search hidden" title="Clear search"><span class="material-symbols-rounded">close</span></button>
            </div>
            <button id="btn-toggle-advanced" title="Toggle Advanced Search"><span class="material-symbols-rounded">tune</span></button>
        </div>
        <div id="advanced-search" class="advanced-search hidden">
            <select id="type-filter"><option value="">All Types</option></select>
            <input type="text" id="tag-filter" placeholder="Filter by #tag">
            <button id="btn-save-search" class="btn-save-search" title="Save this search as a bookmark"><span class="material-symbols-rounded">bookmark</span> Save Search</button>
        </div>
    </div>
</div>

        <div id="note-list"></div>
    </aside>

    <div id="sidebar-resizer" class="resizer"></div>

    <main class="editor-view">
        <div id="editor-placeholder" class="empty-state">
            <div class="empty-state-content">
                <span class="empty-state-icon">📝</span>
                <p>Select a note from the sidebar to start editing</p>
            </div>
        </div>

        <div id="editor-container" class="hidden">
            <div class="editor-header">
                <button id="btn-close" title="Close"><span class="material-symbols-rounded">close</span></button>
                <button id="btn-edit" class="btn-primary" title="Edit Note"><span class="material-symbols-rounded">edit</span></button>
                <button id="btn-view-toggle" class="hidden" title="View Note"><span class="material-symbols-rounded">visibility</span></button>
                <button id="btn-save" class="hidden" disabled title="Save Changes"><span class="material-symbols-rounded">save</span></button>
                <button id="btn-delete" class="btn-delete" title="Delete Note"><span class="material-symbols-rounded">delete</span></button>
            </div>
            <div id="metadata-form" class="metadata-form"></div>
            
            <!-- Viewer Mode Container -->
            <div id="body-viewer" class="body-viewer"></div>
            
            <!-- Editor Mode Container (Hidden by default) -->
            <div id="body-editor" class="hidden"></div>

            <div id="editor-footer" class="editor-footer hidden">
                <span id="last-modified-text"></span>
            </div>
        </div>
    </main>
</div>

<div id="create-modal" class="modal-overlay hidden">
    <div class="modal-content">
        <h2 style="margin-top: 0;">New Note</h2>
        
        <div class="template-selector" style="margin-top: 0;">
            <label for="template-select" style="font-size: 0.85rem; color: var(--md-sys-color-outline);">Use Template:</label>
            <select id="template-select">
                <option value="">None (Blank Note)</option>
            </select>
        </div>

        <div id="template-variables" class="dynamic-variables"></div>

        <input type="text" id="new-title" placeholder="Title">
        
        <div class="type-selector">
            <input type="text" id="new-type" list="type-list" value="" placeholder="Type [note]">
            <datalist id="type-list">
                <option value="note">
                <option value="template">
                <option value="query">
            </datalist>
        </div>

        <div style="display: flex; gap: 0.5rem; margin-top: 0.5rem;">
            <button id="btn-submit-create" class="btn-primary" style="flex: 1;">Create</button>
            <button id="btn-cancel-create" style="flex: 1;">Cancel</button>
        </div>
    </div>
</div>

<script src="https://uicdn.toast.com/editor/latest/toastui-editor-all.min.js"></script>
<script type="module" src="./app.js"></script>
</body>
</html>
