<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Atomic PKM</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

<div class="app-container" id="app">
    <aside class="sidebar">
<div class="sidebar-header">
    <button id="btn-new">+</button>
    <input type="text" id="search-bar" placeholder="Search...">
    <button id="btn-sync" title="Sync Files">🔄 </button><span id="sync-status" style="font-size: 0.6rem; color: #999;"></span>
    <select id="type-filter"><option value="">All</option></select>
</div>
        <div id="note-list"></div>
    </aside>

    <main class="editor-view">
        <div class="editor-header" style="padding:10px; border-bottom:1px solid #eee;">
            <button id="btn-close" >Close</button>
            <button id="btn-save">Save</button>
            <button id="btn-delete" style="color:red">Delete</button>
        </div>
        <div id="metadata-form" style="padding:15px; background:#fefefe; border-bottom:1px solid #eee;"></div>
<textarea id="body-editor" placeholder="Select a note..."></textarea>
<div id="editor-footer" style="display: none; padding: 10px; font-size: 0.75rem; color: #888; border-top: 1px solid #eee; background: #fafafa; text-align: right;">
    <span id="last-modified-text"></span>
</div>
    </main>
</div>

<div id="create-modal" style="display:none; position:fixed; z-index:100; left:0; top:0; width:100%; height:100%; background:rgba(0,0,0,0.5);">
    <div style="background:white; margin:10% auto; padding:20px; width:300px; border-radius:8px;">
        <input type="text" id="new-title" placeholder="Title">
        <input type="text" id="new-type" value="note" placeholder="Type"> 
        <button id="btn-submit-create">Create</button>
        <button onclick="document.getElementById('create-modal').style.display='none'">Cancel</button>
    </div>
</div>

<script type="module" src="./app.js"></script>
</body>
</html>
