<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Atomic PKM</title>
    <link rel="stylesheet" href="style.css">
    <!-- Toast UI Editor -->
    <link rel="stylesheet" href="https://uicdn.toast.com/editor/latest/toastui-editor.min.css" />
</head>
<body>

<div class="app-container" id="app">
    <aside class="sidebar">
<div class="sidebar-header">
    <div class="menu-container">
        <button id="btn-menu" title="Menu">☰</button>
        <div id="menu-dropdown" class="dropdown-content hidden">
            <button id="btn-sync" title="Sync Files">🔄 Sync Data</button>
        </div>
    </div>
    <button id="btn-new" title="New Note">+</button>
    <input type="text" id="search-bar" placeholder="Search...">
    <select id="type-filter"><option value="">All</option></select>
</div>
        <div id="note-list"></div>
    </aside>

    <div id="sidebar-resizer" class="resizer"></div>

    <main class="editor-view">
        <div id="editor-placeholder" class="empty-state">
            <div class="empty-state-content">
                <span class="empty-state-icon">📝</span>
                <p>Select a note from the sidebar to start editing</p>
            </div>
        </div>

        <div id="editor-container" class="hidden">
            <div class="editor-header">
                <button id="btn-close" >Close</button>
                <button id="btn-save" disabled>Save</button>
                <button id="btn-delete" class="btn-delete">Delete</button>
            </div>
            <div id="metadata-form" class="metadata-form"></div>
            <div id="body-editor"></div>
            <div id="editor-footer" class="editor-footer hidden">
                <span id="last-modified-text"></span>
            </div>
        </div>
    </main>
</div>

<div id="create-modal" class="modal-overlay hidden">
    <div class="modal-content">
        <input type="text" id="new-title" placeholder="Title">
        <input type="text" id="new-type" value="note" placeholder="Type"> 
        <button id="btn-submit-create">Create</button>
        <button id="btn-cancel-create">Cancel</button>
    </div>
</div>

<script src="https://uicdn.toast.com/editor/latest/toastui-editor-all.min.js"></script>
<script type="module" src="./app.js"></script>
</body>
</html>
